services:
  - type: web
    name: hyrein-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a strong secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://www.hyrein.in
      - key: GOOGLE_CLIENT_ID
        sync: false          # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: GOOGLE_CALLBACK_URL
        value: https://www.hyrein.in/auth/google/callback
      - key: CORS_ORIGIN
        sync: false          # e.g. https://hyrein.in,https://www.hyrein.in
      - key: MAX_FILE_SIZE_MB
        value: 5
      - key: MAX_ROWS_PER_UPLOAD
        value: 5000
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
